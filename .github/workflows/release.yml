name: Release desktop app

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            args: --mac dmg zip --universal
          - os: windows-latest
            args: --win nsis
          - os: ubuntu-latest
            args: --linux AppImage deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install x86_64 Python venv for universal backend (macOS)
        if: runner.os == 'macOS'
        run: |
          arch -x86_64 "${{ env.pythonLocation }}/bin/python" -m venv .venv-x86
          arch -x86_64 .venv-x86/bin/python -m pip install --upgrade pip
          arch -x86_64 .venv-x86/bin/python -m pip install -r requirements.txt

      - name: Install unixODBC (macOS)
        if: runner.os == 'macOS'
        run: brew install unixodbc

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend and backend
        env:
          QUERYLINE_X86_PYTHON: ${{ runner.os == 'macOS' && format('{0}/.venv-x86/bin/python', github.workspace) || '' }}
        run: |
          npm run icons:prepare
          npm run build
          npm run desktop:backend

      - name: Publish installer
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
